<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProConnect - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      color: #1f2937;
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .features {
      background: #f9fafb;
      padding: 20px;
      border-radius: 8px;
      text-align: left;
      margin-bottom: 30px;
    }

    .features h3 {
      color: #1f2937;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 15px;
      text-align: center;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #4b5563;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .feature-item:last-child {
      margin-bottom: 0;
    }

    .check {
      color: #0d9488;
      font-weight: bold;
    }

    button {
      background: #0d9488;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #0b7370;
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 6px;
      color: #92400e;
      font-size: 14px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f97316;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>ProConnect needs an internet connection to load messages and communicate with your landlord or tenants.</p>

    <div class="features">
      <h3>What you can still do:</h3>
      <div class="feature-item">
        <span class="check">✓</span>
        View cached messages
      </div>
      <div class="feature-item">
        <span class="check">✓</span>
        Draft new messages (will send when online)
      </div>
      <div class="feature-item">
        <span class="check">✓</span>
        Access your profile and settings
      </div>
    </div>

    <button onclick="location.reload()">Check Connection</button>

    <div class="status">
      <span class="dot"></span>
      Waiting for connection...
    </div>
  </div>

  <script>
    // Check if connection is restored
    window.addEventListener('online', () => {
      console.log('Connection restored');
      setTimeout(() => {
        location.reload();
      }, 1000);
    });

    // Auto-check connection every 5 seconds
    setInterval(() => {
      fetch('/favicon.ico', { method: 'HEAD' })
        .then(() => {
          location.reload();
        })
        .catch(() => {
          // Still offline
        });
    }, 5000);
  </script>
</body>
</html>
